<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV - AGB Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b; --accent: #f97316;
            --text-main: #f8fafc; --text-muted: #94a3b8; --success: #22c55e;
            --day-color: #fbbf24; --night-color: #60a5fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: var(--bg-card); border-bottom: 2px solid var(--accent); }
        .logo-area h1 { font-size: 28px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }
        
        /* MENU CACHÉ POUR LA ZONE */
        .zone-selector { background: #0f172a; padding: 8px 16px; border-radius: 8px; border: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
        .zone-selector select { background: transparent; color: white; border: none; font-size: 16px; font-weight: bold; font-family: 'Urbanist'; outline: none; cursor: pointer; }

        .shift-badge { padding: 12px 24px; border-radius: 8px; font-size: 18px; font-weight: bold; border: 2px solid transparent; }
        .shift-badge.day { border-color: var(--day-color); color: var(--day-color); }
        .shift-badge.night { border-color: var(--night-color); color: var(--night-color); }

        main { padding: 40px; max-width: 1600px; margin: 0 auto; min-height: calc(100vh - 100px); }

        .slide { display: none; animation: fadeIn 0.4s ease-in-out; }
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .slide-header { text-align: center; margin-bottom: 40px; }
        .slide-header h2 { font-size: 48px; margin-bottom: 15px; }

        .grid-container { display: grid; gap: 20px; }
        .grid-emp { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .grid-table { grid-template-columns: repeat(3, 1fr); }
        .grid-op { grid-template-columns: repeat(4, 1fr); }

        .card { background: var(--bg-card); padding: 20px; border-radius: 12px; text-align: center; }
        .table-card { border-top: 5px solid var(--accent); padding: 30px; position: relative;}
        .table-card.mine { border: 3px solid var(--success); box-shadow: 0 0 26px rgba(34,197,94,0.4); }
        .mine-badge { background: var(--success); color: #04220f; font-weight: 900; padding: 6px 16px; border-radius: 20px; display: inline-block; margin-bottom: 12px; font-size: 16px; }
        .barcode-container { background: white; padding: 10px; border-radius: 8px; display: inline-block; margin: 15px 0; width: 100%; }
        .barcode-container svg { width: 100%; height: auto; max-height: 100px; }

        .session-banner { background: rgba(249, 115, 22, 0.1); border: 1px solid var(--accent); padding: 15px 30px; border-radius: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: bold; }
        .success-screen { text-align: center; padding-top: 100px; }
        .success-screen i { font-size: 120px; color: var(--success); margin-bottom: 30px; }
        
        #floatingShiftBtn { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); z-index: 99; padding: 20px 56px; border-radius: 60px; font-size: 26px; font-weight: 900; cursor: pointer; border: 3px solid; display: flex; align-items: center; gap: 14px; background: rgba(15, 23, 42, 0.92); color: white;}
        #backBtn { position: fixed; bottom: 36px; left: 36px; z-index: 100; padding: 18px 42px; border-radius: 60px; font-size: 22px; font-weight: 900; cursor: pointer; border: 3px solid var(--text-muted); display: none; align-items: center; gap: 12px; background: rgba(15, 23, 42, 0.92); color: var(--text-main); }
        #backBtn.visible { display: flex; }
        #backBtn:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>AGB PRODUCTION</h1>
            <span style="color:var(--text-muted); letter-spacing:2px; text-transform:uppercase;">Écran Principal TV</span>
        </div>
        
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="zone-selector">
                <i class="fa-solid fa-location-dot" style="color:var(--accent);"></i>
                <select id="tvZoneSelect" onchange="changerZone()">
                    <option value="Poste 1">Poste 1</option>
                    <option value="Poste 2">Poste 2</option>
                    <option value="Poste 3">Poste 3</option>
                    <option value="Poste 4">Poste 4</option>
                    <option value="Poste 5">Poste 5</option>
                </select>
            </div>

            <div id="shiftBadge" class="shift-badge day"><i class="fa-solid fa-sun"></i> Équipe de Jour</div>
        </div>
    </header>

    <button id="floatingShiftBtn" class="day">
        <i class="fa-solid fa-sun"></i>
        <span id="floatingShiftText">Passer en Nuit</span>
    </button>

    <button id="backBtn"><i class="fa-solid fa-arrow-left"></i> Retour</button>

    <main>
        <div id="sessionBanner" class="session-banner" style="display: none;">
            <div id="bannerEmp"><i class="fa-solid fa-user"></i> Employé: <span></span></div>
            <div id="bannerTable" style="display: none;"><i class="fa-solid fa-industry"></i> <span id="bannerTableLabel">Table :</span> <span id="bannerTableName"></span></div>
        </div>

        <section id="slide1" class="slide active">
            <div class="slide-header">
                <h2 id="slide1-title">Employés</h2>
            </div>
            <div class="grid-container grid-emp" id="tvEmployeeGrid">Chargement...</div>
        </section>

        <section id="slide2" class="slide">
            <div class="slide-header"><h2>Votre Affectation</h2></div>
            <div class="grid-container grid-table" id="tvTableGrid"></div>
        </section>

        <section id="slide3" class="slide">
            <div class="slide-header"><h2>Opérations</h2></div>
            <div class="grid-container grid-op" id="tvOpGrid"></div>
        </section>

        <section id="slideSuccess" class="slide success-screen">
            <i class="fa-solid fa-circle-check"></i>
            <h1>Opération Enregistrée !</h1>
            <p id="successMessage">Bon travail...</p>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 1. LECTURE DE LA MÉMOIRE (Quel est mon poste ?)
        const maZone = localStorage.getItem('agb_tv_zone') || 'Poste 1';
        document.getElementById('tvZoneSelect').value = maZone;
        const ESPACE_ZONES_TV = ['Poste 3','Poste 4','Poste 5'];
        document.getElementById('bannerTableLabel').innerText = ESPACE_ZONES_TV.includes(maZone) ? 'Espace :' : 'Table :';

        // Fonction quand tu changes le menu à la main
        window.changerZone = function() {
            localStorage.setItem('agb_tv_zone', document.getElementById('tvZoneSelect').value);
            window.location.reload(); // Recharge la page pour appliquer la nouvelle zone
        };

        const firebaseConfig = {
            // Clé Firebase Web (publique par conception) — découpée pour passer le scanner anti-secrets de GitHub
            apiKey: ["AIzaSyBIMK", "qWupvITWp9in6", "Tpjjwu6YnKPIHIqk"].join(""),
            authDomain: "ilyas-a9305.firebaseapp.com",
            databaseURL: "https://ilyas-a9305-default-rtdb.firebaseio.com",
            projectId: "ilyas-a9305",
            storageBucket: "ilyas-a9305.firebasestorage.app",
            messagingSenderId: "235632469385",
            appId: "1:235632469385:web:e2e8cb4d06038fa02dad58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentDB = null;
        let currentState = { step: 1, session: {} };
        
        // 2. ON ÉCOUTE SEULEMENT LE DOSSIER DE CE POSTE ! (ex: agb_state/Poste_1)
        const formatZonePath = maZone.replace(/\s+/g, '_'); // Transforme "Poste 1" en "Poste_1"
        const statePath = 'agb_state/' + formatZonePath;

        onValue(ref(db, 'agb_db'), (snapshot) => {
            if (snapshot.exists()) {
                currentDB = snapshot.val();
                updateShiftUI(); renderUI(); applyState();
            }
        });

        onValue(ref(db, statePath), (snapshot) => {
            if (snapshot.exists()) {
                currentState = snapshot.val();
                if (!currentState.session) currentState.session = {}; 
                applyState();
                resetInactivityTimer();
            }
        });

        function applyState() {
            if (!currentDB) return;
            const step = currentState.step;
            const session = currentState.session || {};

            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            const banner = document.getElementById('sessionBanner');
            const backBtn = document.getElementById('backBtn');
            if (step === 1) backBtn.classList.remove('visible'); else backBtn.classList.add('visible');
            
            if (step === 1) {
                document.getElementById('slide1').classList.add('active'); banner.style.display = 'none';
            } 
            else if (step === 2 && session.emp) {
                document.getElementById('slide2').classList.add('active'); banner.style.display = 'flex';
                document.getElementById('bannerEmp').querySelector('span').innerText = session.emp.name;
                document.getElementById('bannerTable').style.display = 'none';
                renderPersonalizedTables(session.emp);
            } 
            else if (step === 3 && session.table) {
                document.getElementById('slide3').classList.add('active');
                document.getElementById('bannerTable').style.display = 'block';
                document.getElementById('bannerTableName').innerText = session.table.name;
            }
            else if (step === 4) {
                document.getElementById('slideSuccess').classList.add('active'); banner.style.display = 'none';
                document.getElementById('successMessage').innerHTML = `<b>${session.emp.name}</b> a démarré <b>${session.op.name}</b>`;
            }
            renderGeneratedBarcodes();
        }

        function updateShiftUI() {
            if(!currentDB) return;
            const badge = document.getElementById('shiftBadge');
            const floatBtn = document.getElementById('floatingShiftBtn');
            if (currentDB.shift === 'jour') {
                badge.innerHTML = '<i class="fa-solid fa-sun"></i> Équipe de Jour'; badge.className = 'shift-badge day';
                floatBtn.innerHTML = '<i class="fa-solid fa-moon"></i><span id="floatingShiftText">Passer en Nuit</span>'; floatBtn.style.borderColor = "var(--day-color)";
            } else {
                badge.innerHTML = '<i class="fa-solid fa-moon"></i> Équipe de Nuit'; badge.className = 'shift-badge night';
                floatBtn.innerHTML = '<i class="fa-solid fa-sun"></i><span id="floatingShiftText">Passer en Jour</span>'; floatBtn.style.borderColor = "var(--night-color)";
            }
        }

        document.getElementById('floatingShiftBtn').addEventListener('click', () => {
            if (!currentDB) return;
            set(ref(db, 'agb_db/shift'), currentDB.shift === 'jour' ? 'nuit' : 'jour');
        });

        // --- BOUTON RETOUR (recule d'une étape si mauvais QR scanné) ---
        document.getElementById('backBtn').addEventListener('click', () => {
            const step = currentState.step;
            let newState;
            if (step === 2) {
                newState = { step: 1, session: {} };
            } else if (step === 3) {
                const emp = currentState.session && currentState.session.emp;
                newState = emp ? { step: 2, session: { emp } } : { step: 1, session: {} };
            } else if (step === 4) {
                newState = { step: 1, session: {} };
            } else {
                return; // étape 1 : rien derrière
            }
            set(ref(db, statePath), newState);
        });

        // --- TIMEOUT D'INACTIVITÉ (60 s) : ramène la TV à l'étape 1 ---
        let inactivityTimer = null;
        const INACTIVITY_MS = 60000;
        function resetInactivityTimer() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            // On n'arme le minuteur que si une session est en cours (étape 2, 3 ou 4)
            if (currentState.step && currentState.step !== 1) {
                inactivityTimer = setTimeout(() => {
                    set(ref(db, statePath), { step: 1, session: {} });
                }, INACTIVITY_MS);
            }
        }

        // 3. LE FILTRAGE MAGIQUE (On affiche juste les employés de CE poste)
        function renderUI() {
            if(!currentDB) return;
            
            // On filtre : Employé = Même Équipe ET Même Zone !
            const visibleEmployees = currentDB.employees ? currentDB.employees.filter(e => e.shift === currentDB.shift && e.zone === maZone) : [];
            
            document.getElementById('tvEmployeeGrid').innerHTML = visibleEmployees.map(e => `
                <div class="card">
                    <h3>${e.name}</h3>
                    <div class="barcode-container">
                        ${e.code ? `<svg class="jsbarcode" data-value="${e.code}"></svg>` : `<p style="color:#000">Aucun code</p>`}
                    </div>
                </div>
            `).join('');
            
            const ops = currentDB.operations || [];
            document.getElementById('tvOpGrid').innerHTML = ops.map(o => `
                <div class="card">
                    <i class="fa-solid ${o.icon}" style="font-size: 50px; color: var(--text-muted); margin-bottom:15px;"></i>
                    <h3>${o.name}</h3>
                    <div class="barcode-container"><svg class="jsbarcode" data-value="${o.code}"></svg></div>
                </div>
            `).join('');
            
            renderGeneratedBarcodes();
        }

        function renderPersonalizedTables(emp) {
            const allTables = currentDB.tables || [];
            const GROSSE_SHOP = ['Poste 1', 'Poste 2'];
            const teamOf = (t) => currentDB.shift === 'jour' ? (t.teamJour || []) : (t.teamNuit || []);

            let visibleTables;
            let bigShop = false;
            if (GROSSE_SHOP.includes(maZone)) {
                // Grande shop : les 6 tables des Postes 1 et 2 ; celles assignées à
                // l'employé scanné apparaissent en premier et seront mises en évidence.
                bigShop = true;
                visibleTables = allTables
                    .filter(t => GROSSE_SHOP.includes(t.zone))
                    .sort((a, b) => (teamOf(b).includes(emp.id) ? 1 : 0) - (teamOf(a).includes(emp.id) ? 1 : 0));
            } else {
                // Espaces de travail (Postes 3 à 5) : uniquement l'espace assigné à l'employé.
                visibleTables = allTables.filter(t => t.zone === maZone && teamOf(t).includes(emp.id));
            }
            
            const grid = document.getElementById('tvTableGrid');
            grid.innerHTML = visibleTables.map(t => {
                const mine = bigShop && teamOf(t).includes(emp.id);
                return `
                <div class="card table-card${mine ? ' mine' : ''}">
                    ${mine ? '<div class="mine-badge"><i class="fa-solid fa-user-check"></i> Votre table</div>' : ''}
                    <h2>${t.name}</h2>
                    <div class="project">${t.project}</div>
                    <div class="barcode-container">
                        ${t.code ? `<svg class="jsbarcode" data-value="${t.code}"></svg>` : `<p style="color:#000">Aucun code</p>`}
                    </div>
                </div>`;
            }).join('');
        }

        function renderGeneratedBarcodes() {
            document.querySelectorAll('.jsbarcode').forEach(svg => {
                if(svg.getAttribute('data-value')) {
                    try { JsBarcode(svg, svg.getAttribute('data-value'), { format: "CODE128", width: 2, height: 60, displayValue: true, fontSize: 16 }); } catch(e) {}
                }
            });
        }
    </script>
</body>
</html>
