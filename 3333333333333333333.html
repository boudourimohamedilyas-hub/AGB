<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin AGB Qualité</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f0f2f5; padding: 20px; color: #111; }
    .container { background: white; padding: 30px; border-radius: 14px; max-width: 950px; margin: auto; border: 0.5px solid #e0e0e0; }
    h2 { margin-bottom: 20px; font-weight: 900; text-align: center; color: #1a6ef7; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .section { background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
    .section.full { grid-column: span 2; }
    h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
    .form-group { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
    .form-group label { width: 140px; font-size: 12px; font-weight: bold; color: #333; flex-shrink: 0; }
    input, select, textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: 'Inter'; font-size: 13px; font-weight: 600; box-sizing: border-box; }
    textarea { resize: vertical; min-height: 50px; }
    .table-row { display: grid; grid-template-columns: 80px 1fr 2fr; gap: 10px; align-items: center; margin-bottom: 10px; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #eee; }
    .table-row strong { font-size: 13px; }
    .annonce-box { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
    .annonce-box h4 { margin: 0 0 10px 0; font-size: 12px; color: #888; text-transform: uppercase; }
    button { background: #1a6ef7; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
    button:hover { background: #0f52ba; }
    #status { text-align: center; color: #00b861; font-weight: bold; margin-top: 15px; display: none; }
  </style>
</head>
<body>

<div class="container">
  <h2>Panneau de Contrôle - AGB</h2>
  
  <div class="grid">
    <div class="section">
      <h3>Indicateurs Clés (KPI)</h3>
      <div class="form-group"><label>Taux Qualité (%)</label><input type="number" id="val-kpi1" value="94"></div>
      <div class="form-group"><label>Taux de Retouche (%)</label><input type="number" id="val-kpi2" value="6"></div>
      <div class="form-group"><label>Non-conformités</label><input type="number" id="val-kpi3" value="3"></div>
      <div class="form-group"><label>1er Passage (%)</label><input type="number" id="val-kpi4" value="88"></div>
      <div class="form-group"><label>Jours sans incident</label><input type="number" id="val-jsi" value="18"></div>
    </div>

    <div class="section">
      <h3>Message de la semaine (⭐)</h3>
      <div class="form-group"><label>Texte (Français)</label><textarea id="msg-motiv-fr">"La qualité n'est pas un acte, c'est une habitude."</textarea></div>
      <div class="form-group"><label>Texte (Anglais)</label><textarea id="msg-motiv-en">"Quality is not an act, it is a habit."</textarea></div>
    </div>

    <div class="section full">
      <h3>Progression et État des Tables</h3>
      <div id="tables-container">
        </div>
    </div>

    <div class="section full">
      <h3>Annonces Internes (📢)</h3>
      
      <div class="annonce-box">
        <h4>Annonce 1</h4>
        <div class="form-group"><label>Couleur du point</label><select id="a1-color"><option value="#d42020" selected>Rouge</option><option value="#e07c00">Orange</option><option value="#1a6ef7">Bleu</option><option value="#00b861">Vert</option></select></div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;"><label>Titre (FR)</label><input type="text" id="a1-fr" value="TABLE 5 — Réunion d'urgence vendredi 9h"></div>
          <div class="form-group" style="flex:1;"><label>Titre (EN)</label><input type="text" id="a1-en" value="TABLE 5 — Emergency meeting Friday 9am"></div>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;"><label>Date/Heure (FR)</label><input type="text" id="a1t-fr" value="Aujourd'hui"></div>
          <div class="form-group" style="flex:1;"><label>Date/Heure (EN)</label><input type="text" id="a1t-en" value="Today"></div>
        </div>
      </div>

      <div class="annonce-box">
        <h4>Annonce 2</h4>
        <div class="form-group"><label>Couleur du point</label><select id="a2-color"><option value="#d42020">Rouge</option><option value="#e07c00" selected>Orange</option><option value="#1a6ef7">Bleu</option><option value="#00b861">Vert</option></select></div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;"><label>Titre (FR)</label><input type="text" id="a2-fr" value="Audit qualité interne — Mercredi matin"></div>
          <div class="form-group" style="flex:1;"><label>Titre (EN)</label><input type="text" id="a2-en" value="Internal quality audit — Wed morning"></div>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;"><label>Date/Heure (FR)</label><input type="text" id="a2t-fr" value="Cette semaine"></div>
          <div class="form-group" style="flex:1;"><label>Date/Heure (EN)</label><input type="text" id="a2t-en" value="This week"></div>
        </div>
      </div>

      <div class="annonce-box">
        <h4>Annonce 3</h4>
        <div class="form-group"><label>Couleur du point</label><select id="a3-color"><option value="#d42020">Rouge</option><option value="#e07c00">Orange</option><option value="#1a6ef7" selected>Bleu</option><option value="#00b861">Vert</option></select></div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;"><label>Titre (FR)</label><input type="text" id="a3-fr" value="Formation sécurité obligatoire — 12 juin"></div>
          <div class="form-group" style="flex:1;"><label>Titre (EN)</label><input type="text" id="a3-en" value="Mandatory safety training — June 12"></div>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="form-group" style="flex:1;"><label>Date/Heure (FR)</label><input type="text" id="a3t-fr" value="Semaine prochaine"></div>
          <div class="form-group" style="flex:1;"><label>Date/Heure (EN)</label><input type="text" id="a3t-en" value="Next week"></div>
        </div>
      </div>
    </div>

    <div class="section full">
      <h3>Bandeau défilant (Ligne du bas)</h3>
      <div class="annonce-box">
        <div class="form-group"><label>Couleur Msg 1</label><select id="t1-type"><option value="">Blanc (Info)</option><option value="tok" selected>Vert (Succès)</option><option value="tow">Orange (Alerte)</option><option value="tob">Rouge (Danger)</option></select></div>
        <div class="form-group"><label>Message 1 (FR)</label><input type="text" id="t1-fr" value="✔ Taux qualité global : 94% — Excellent !"></div>
        <div class="form-group"><label>Message 1 (EN)</label><input type="text" id="t1-en" value="✔ Overall quality rate: 94% — Excellent!"></div>
      </div>
      <div class="annonce-box">
        <div class="form-group"><label>Couleur Msg 2</label><select id="t2-type"><option value="">Blanc (Info)</option><option value="tok">Vert (Succès)</option><option value="tow">Orange (Alerte)</option><option value="tob" selected>Rouge (Danger)</option></select></div>
        <div class="form-group"><label>Message 2 (FR)</label><input type="text" id="t2-fr" value="🔥 TABLE 5 — Retouche requise"></div>
        <div class="form-group"><label>Message 2 (EN)</label><input type="text" id="t2-en" value="🔥 TABLE 5 — Rework required"></div>
      </div>
      <div class="annonce-box">
        <div class="form-group"><label>Couleur Msg 3</label><select id="t3-type"><option value="" selected>Blanc (Info)</option><option value="tok">Vert (Succès)</option><option value="tow">Orange (Alerte)</option><option value="tob">Rouge (Danger)</option></select></div>
        <div class="form-group"><label>Message 3 (FR)</label><input type="text" id="t3-fr" value="🛡️ 18 jours sans incident — Objectif : 30 jours"></div>
        <div class="form-group"><label>Message 3 (EN)</label><input type="text" id="t3-en" value="🛡️ 18 days without incident — Target: 30 days"></div>
      </div>
    </div>

  </div>
  
  <button id="btn-update">PUBLIER SUR L'AFFICHAGE</button>
  <p id="status">Données envoyées avec succès à l'affichage ! ✅</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
  const tablesContainer = document.getElementById('tables-container');
  const defaultPcts = [80, 90, 55, 40, 25, 100];
  const defaultStates = ['sg', 'sr', 'sg', 'so', 'sred', 'sd'];
  
  // Génération des inputs des tables
  for(let i=1; i<=6; i++) {
    tablesContainer.innerHTML += `
      <div class="table-row">
        <strong>TABLE ${i}</strong>
        <input type="number" id="val-t${i}" placeholder="%" value="${defaultPcts[i-1]}">
        <select id="state-t${i}">
          <option value="sg" ${defaultStates[i-1]=='sg'?'selected':''}>✅ En cours (Vert)</option>
          <option value="sr" ${defaultStates[i-1]=='sr'?'selected':''}>🚀 Avance rapide (Bleu)</option>
          <option value="so" ${defaultStates[i-1]=='so'?'selected':''}>🐢 En retard (Orange)</option>
          <option value="sred" ${defaultStates[i-1]=='sred'?'selected':''}>🔥 Bloqué (Rouge)</option>
          <option value="sd" ${defaultStates[i-1]=='sd'?'selected':''}>🏁 Terminé (Gris)</option>
        </select>
      </div>
    `;
  }

  // LOGIQUE INTELLIGENTE DES TABLES
  for(let i=1; i<=6; i++) {
    const inputPct = document.getElementById('val-t'+i);
    const selectState = document.getElementById('state-t'+i);

    // Modifier le select -> Force 100% si terminé
    selectState.addEventListener('change', function(e) {
      if(e.target.value === 'sd') inputPct.value = 100;
    });

    // Taper le pourcentage -> Modifie le statut automatiquement
    inputPct.addEventListener('input', function(e) {
      const val = parseInt(e.target.value);
      if(val === 100) selectState.value = 'sd';
      else if (val < 100 && selectState.value === 'sd') selectState.value = 'sg'; 
    });
  }

  // CONFIGURATION FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyBZkmAglZh1HmfVYKgy0EGfw8kuIRHOR6Q",
    authDomain: "agb-product.firebaseapp.com",
    databaseURL: "https://agb-product-default-rtdb.firebaseio.com",
    projectId: "agb-product",
    storageBucket: "agb-product.firebasestorage.app",
    messagingSenderId: "1067586214794",
    appId: "1:1067586214794:web:6f8309a3b017841a118673"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  document.getElementById('btn-update').addEventListener('click', () => {
    
    // Récupération Tables
    let tablesData = {};
    for(let i=1; i<=6; i++) {
      tablesData['t'+i] = { 
        pct: document.getElementById('val-t'+i).value, 
        state: document.getElementById('state-t'+i).value 
      };
    }

    // Préparation de l'objet global
    const data = {
      kpis: {
        qualite: document.getElementById('val-kpi1').value,
        retouche: document.getElementById('val-kpi2').value,
        nc: document.getElementById('val-kpi3').value,
        fpp: document.getElementById('val-kpi4').value,
        jsi: document.getElementById('val-jsi').value
      },
      tables: tablesData,
      messages: {
        motiv: { 
          fr: document.getElementById('msg-motiv-fr').value, 
          en: document.getElementById('msg-motiv-en').value 
        },
        annonces: {
          a1color: document.getElementById('a1-color').value, a1fr: document.getElementById('a1-fr').value, a1en: document.getElementById('a1-en').value, a1t_fr: document.getElementById('a1t-fr').value, a1t_en: document.getElementById('a1t-en').value,
          a2color: document.getElementById('a2-color').value, a2fr: document.getElementById('a2-fr').value, a2en: document.getElementById('a2-en').value, a2t_fr: document.getElementById('a2t-fr').value, a2t_en: document.getElementById('a2t-en').value,
          a3color: document.getElementById('a3-color').value, a3fr: document.getElementById('a3-fr').value, a3en: document.getElementById('a3-en').value, a3t_fr: document.getElementById('a3t-fr').value, a3t_en: document.getElementById('a3t-en').value
        },
        ticker: {
          m1type: document.getElementById('t1-type').value, m1fr: document.getElementById('t1-fr').value, m1en: document.getElementById('t1-en').value,
          m2type: document.getElementById('t2-type').value, m2fr: document.getElementById('t2-fr').value, m2en: document.getElementById('t2-en').value,
          m3type: document.getElementById('t3-type').value, m3fr: document.getElementById('t3-fr').value, m3en: document.getElementById('t3-en').value
        }
      }
    };

    // Envoi à la base de données
    db.ref('dashboardData').set(data).then(() => {
      const status = document.getElementById('status');
      status.style.display = 'block';
      setTimeout(() => status.style.display = 'none', 3000);
    });
  });
</script>
</body>
</html>
